name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Set up Java (required by Allure CLI)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Allure CLI
        run: |
          wget -q https://github.com/allure-framework/allure2/releases/download/2.39.0/allure-2.39.0.tgz
          tar -xzf allure-2.39.0.tgz
          sudo mv allure-2.39.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure
          allure --version

      - name: Create appsettings.json
        run: |
          cat > SdetPractice/SdetPractice/appsettings.json << 'EOF'
          {
            "TestSettings": {
              "BaseUrl": "https://the-internet.herokuapp.com",
              "Browser": "Chrome",
              "Headless": true,
              "ExplicitWaitSeconds": 10,
              "PageLoadTimeoutSeconds": 30,
              "BasicAuthUsername": "admin",
              "BasicAuthPassword": "admin"
            }
          }
          EOF

      - name: Restore dependencies
        run: dotnet restore SdetPractice/SdetPractice.csproj

      - name: Build
        run: dotnet build SdetPractice/SdetPractice.csproj --no-restore

      - name: Run tests
        run: dotnet test SdetPractice/SdetPractice.csproj --no-build
        continue-on-error: true

      - name: Generate Allure report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
