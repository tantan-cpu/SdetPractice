name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    schedule:
    - cron: '0 16 * * *'   # 12 midnight PHT (UTC+8 = 16:00 UTC)
    - cron: '0 22 * * *'   # 6AM PHT
    - cron: '0 4 * * *'    # 12 noon PHT
    - cron: '0 10 * * *'   # 6PM PHT

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: '10.0.x'

      - name: Set up Java (required by Allure CLI)
        uses: actions/setup-java@v5.2.0
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Allure CLI
        run: |
          wget -q https://github.com/allure-framework/allure2/releases/download/2.39.0/allure-2.39.0.tgz
          tar -xzf allure-2.39.0.tgz
          sudo mv allure-2.39.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure
          allure --version

      - name: Create appsettings.json
        run: echo '{"TestSettings":{"BaseUrl":"https://the-internet.herokuapp.com","Browser":"Chrome","Headless":true,"ExplicitWaitSeconds":10,"PageLoadTimeoutSeconds":30,"BasicAuthUsername":"admin","BasicAuthPassword":"admin"}}' > SdetPractice/appsettings.json

      - name: Restore dependencies
        run: dotnet restore SdetPractice/SdetPractice.csproj

      - name: Build
        run: dotnet build SdetPractice/SdetPractice.csproj --no-restore

      - name: Run tests
        run: dotnet test SdetPractice/SdetPractice.csproj --no-build
        continue-on-error: true

      - name: Copy categories config
        if: always()
        run: cp categories.json allure-results/categories.json

      - name: Generate Allure report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      - name: Upload Allure results artifact
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: allure-results
          path: allure-results/

      - name: Setup Pages
        if: always()
        uses: actions/configure-pages@v6.0.0

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: allure-report/

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: always()

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
